services:
  lvnotes:
    build: .
    container_name: lvnotes
    ports:
      - "127.0.0.1:5000:5000"
    volumes:
      - lvnotes_data:/app/data
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    command: tunnel --url http://lvnotes:5000
    restart: unless-stopped
    depends_on:
      - lvnotes

volumes:
  lvnotes_data:
